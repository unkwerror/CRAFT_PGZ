services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: tender
      POSTGRES_PASSWORD: tender
      POSTGRES_DB: tender
    ports:
      # только localhost — НЕ выставляем БД с дефолтными паролями в интернет
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tender -d tender"]
      interval: 5s
      timeout: 3s
      retries: 10

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    # Образ с CLI. Загрузка выгрузки выполняется вручную:
    #   docker compose run --rm worker tender ingest --file /data/<выгрузка>.xlsx
    # (смонтируй каталог с файлом в /data при необходимости).
    command: ["tender", "--help"]

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    # Только localhost — наружу проксирует nginx (TLS терминируется на нём).
    ports:
      - "127.0.0.1:8000:8000"
    command:
      ["uvicorn", "tender_ingest.web.app:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  pgdata:
