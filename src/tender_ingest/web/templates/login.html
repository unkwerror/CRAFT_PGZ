{% set show_nav = false %}
{% extends "base.html" %}
{% block title %}Вход — Закупки бюро{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <form action="/login" method="post" class="bg-white p-8 rounded-lg shadow-sm w-full max-w-sm">
    <h1 class="text-lg font-semibold mb-1">Закупки бюро</h1>
    <p class="text-sm text-slate-500 mb-6">Введите пароль доступа</p>
    {% if error %}
    <div class="mb-4 text-sm text-red-700 bg-red-50 border border-red-200 rounded px-3 py-2">{{ error }}</div>
    {% endif %}
    <input type="password" name="password" autofocus required placeholder="Пароль"
           class="w-full border border-slate-300 rounded px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-slate-400">
    <button class="w-full bg-slate-900 text-white rounded px-3 py-2 hover:bg-slate-700">Войти</button>
  </form>
</div>
{% endblock %}
