<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Тендеры{% endblock %} · КРАФТ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  {% if show_nav | default(true) %}
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/" class="font-semibold text-slate-900 flex items-center gap-2">
          <span class="inline-block w-2.5 h-2.5 rounded-sm bg-emerald-500"></span>Тендеры
        </a>
        <a href="/" class="text-sm text-slate-500 hover:text-slate-900">Список</a>
        <a href="/upload" class="text-sm text-slate-500 hover:text-slate-900">Загрузить выгрузку</a>
      </div>
      <form action="/logout" method="post">
        <button class="text-sm text-slate-400 hover:text-slate-700">Выйти</button>
      </form>
    </div>
  </header>
  {% endif %}
  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
