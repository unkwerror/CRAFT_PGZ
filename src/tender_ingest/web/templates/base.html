<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Закупки бюро{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  {% if show_nav | default(true) %}
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <nav class="flex items-center gap-6">
        <a href="/" class="font-semibold text-slate-900">Закупки бюро</a>
        <a href="/" class="text-sm text-slate-600 hover:text-slate-900">Список</a>
        <a href="/upload" class="text-sm text-slate-600 hover:text-slate-900">Загрузить выгрузку</a>
      </nav>
      <form action="/logout" method="post">
        <button class="text-sm text-slate-500 hover:text-slate-800">Выйти</button>
      </form>
    </div>
  </header>
  {% endif %}
  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
