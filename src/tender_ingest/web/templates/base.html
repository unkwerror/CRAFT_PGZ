<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Тендеры{% endblock %} · КРАФТ</title>
  <link rel="stylesheet" href="/static/tailwind.css">
  <script>
  /* Поллинг фоновой джобы: обновляет прогресс-бар (фаза, ширина, ETA), по завершении
     перезагружает страницу. Используется разбором ТЗ, экономикой и скорингом. */
  window.craftProgressPoll = function (url, barId, intervalMs) {
    var el = document.getElementById(barId);
    if (!el) return;
    var fill = el.querySelector('[data-role=fill]');
    var phase = el.querySelector('[data-role=phase]');
    var eta = el.querySelector('[data-role=eta]');
    function fmtEta(sec) {
      if (sec == null) return '';
      if (sec < 90) return 'осталось ~' + Math.max(5, Math.round(sec / 5) * 5) + ' сек';
      return 'осталось ~' + Math.round(sec / 60) + ' мин';
    }
    var poll = setInterval(async function () {
      try {
        var r = await fetch(url, { headers: { 'Accept': 'application/json' } });
        var s = await r.json();
        if (!s.running) { clearInterval(poll); window.location.reload(); return; }
        if (s.progress != null) fill.style.width = Math.max(4, Math.min(97, s.progress)) + '%';
        if (s.phase) phase.textContent = s.phase;
        eta.textContent = fmtEta(s.eta);
      } catch (e) { /* сеть моргнула — повторим */ }
    }, intervalMs || 3000);
  };
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  {% if show_nav | default(true) %}
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="/" class="font-semibold text-slate-900 flex items-center gap-2">
          <span class="inline-block w-2.5 h-2.5 rounded-sm bg-emerald-500"></span>Тендеры
        </a>
        <a href="/" class="text-sm text-slate-500 hover:text-slate-900">Список</a>
        <a href="/upload" class="text-sm text-slate-500 hover:text-slate-900">Загрузить выгрузку</a>
        <a href="/closed/new" class="text-sm text-slate-500 hover:text-slate-900">+ Закрытый тендер</a>
        <a href="/analytics" class="text-sm text-slate-500 hover:text-slate-900">Аналитика</a>
        <a href="/blacklist" class="text-sm text-slate-500 hover:text-slate-900">Стоп-лист</a>
      </div>
      <form action="/logout" method="post">
        <button class="text-sm text-slate-400 hover:text-slate-700">Выйти</button>
      </form>
    </div>
  </header>
  {% endif %}
  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
